<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <img src="images/background.png" alt="background image" />
    <div id="inputPage">
      <div class="hero">
        <h2>
          Lorem ipsum dolor sit amet consectetur adipisicing elit. Quas sed
          impedit accusantium odit incidunt possimus omnis nemo deleniti minus
          sequi veniam dolor maxime quo velit at beatae repudiandae, ab quia!
        </h2>
        <h2>Lorem ipsum dolor</h2>
      </div>

      <div class="info">
        <h2>Lorem ipsum dolor</h2>

        <form action="" method="get">
          <div class="textBoxes">
            <div class="input">
              <label for="first_name">FIRST NAME</label>
              <input type="text" id="first_name" name="first_name" />
            </div>

            <div class="input">
              <label for="last_name">LAST NAME</label>
              <input type="text" id="last_name" name="last_name" />
            </div>

            <div class="input">
              <label for="email">EMAIL</label>
              <input type="email" id="email" name="email" />
            </div>

            <div class="input">
              <label for="phone_number">PHONE NUMBER</label>
              <input type="number" id="phone_number" name="phone_number" />
            </div>

            <div class="input">
              <label for="password">PASSWORD</label>
              <input type="password" id="password" name="password" />
            </div>

            <div class="input">
              <label for="confirm_password">CONFIRM PASSWORD</label>
              <input
                type="password"
                id="confirm_password"
                name="confirm_password"
              />
            </div>
          </div>

          <hr />

          <button type="submit">Create Account</button>
          <p>Already have an account? <a href="">Log in</a></p>
        </form>
      </div>
    </div>
  </body>
</html>
