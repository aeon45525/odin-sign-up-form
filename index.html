<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="imgContainer">
      <img
        class="porscheBackground"
        src="images/background.png"
        alt="background image"
      />
      <div class="logoContainer">
        <img class="porscheLogo" src="images/logo.svg" alt="porsche logo" />
        <h1 class="porscheText">PORSCHE</h1>
      </div>
    </div>

    <div id="inputPage">
      <div class="hero">
        <h3 class="text">
          This is not a real online service! You know you need something like
          this in your life to help you realize your deepest dreams.
          <span>Sign up <em>now</em> to get started.</span>
        </h3>
        <h3>You <em>know</em> you want to.</h3>
      </div>

      <div class="info">
        <h3>Let's do this!</h3>

        <form action="" method="get">
          <div class="textBoxesContainer">
            <div class="inputContainer">
              <label for="first_name">FIRST NAME</label>
              <input
                type="text"
                id="first_name"
                name="first_name"
                placeholder="John"
                pattern="[A-Z][a-zA-Z]{0,19}"
                maxlength="20"
                title="Please enter a valid first name, example: John"
                required
              />
            </div>

            <div class="inputContainer">
              <label for="last_name">LAST NAME</label>
              <input
                type="text"
                id="last_name"
                name="last_name"
                placeholder="Doe"
                pattern="[A-Z][a-zA-Z]{0,19}"
                maxlength="20"
                title="Please enter a valid last name, example: Doe"
                required
              />
            </div>

            <div class="inputContainer">
              <label for="email">EMAIL</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="johndoe@gmail.com"
                title="Please enter a valid email, example: johndoe@gmail.com"
                required
              />
            </div>

            <div class="inputContainer">
              <label for="phone_number">PHONE NUMBER</label>
              <input
                type="tel"
                id="phone_number"
                name="phone_number"
                placeholder="09XXXXXXXXX"
                pattern="[0-9]{11}"
                title="Please enter a valid phone number, example: 09XXXXXXXXX"
                required
              />
            </div>

            <div class="inputContainer">
              <label for="password">PASSWORD</label>
              <input
                type="password"
                id="password"
                name="password"
                pattern=".{6,}"
                title="Password must be at least 6 characters"
                required
              />
            </div>

            <div class="inputContainer">
              <label for="confirm_password">CONFIRM PASSWORD</label>
              <input
                type="password"
                id="confirm_password"
                name="confirm_password"
                pattern=".{6,}"
                title="Password must match"
                required
              />
            </div>
          </div>

          <hr />

          <div class="endForm">
            <button type="submit">Create Account</button>
            <p>Already have an account? <a href="">Log in</a></p>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
